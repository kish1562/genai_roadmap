<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0D1117; --panel:#12161C; --panel-hi:#161B22; --border:#262C36;
    --text:#C9D1D9; --text-dim:#7D8590; --amber:#E3B341; --green:#3FB950; --red:#f85149;
  }
  *{box-sizing:border-box;}
  body{background:var(--bg);margin:0;}
  #root{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;
    padding:28px 18px 60px;max-width:760px;margin:0 auto;}
  .eyebrow{font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.14em;
    color:var(--amber);text-transform:uppercase;}
  h1{font-family:'JetBrains Mono',monospace;font-weight:800;font-size:26px;margin:6px 0 4px;
    color:#fff;letter-spacing:-0.01em;}
  .sub{color:var(--text-dim);font-size:13.5px;line-height:1.5;}
  .statusbar{display:flex;align-items:center;justify-content:space-between;margin-top:14px;
    font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--text-dim);}
  .statusbar .dot{width:7px;height:7px;border-radius:50%;background:var(--text-dim);
    display:inline-block;margin-right:6px;}
  .statusbar .dot.ok{background:var(--green);}
  .statusbar .dot.err{background:var(--red);}
  .statusbar button{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--text-dim);
    background:none;border:1px solid var(--border);padding:4px 8px;border-radius:6px;cursor:pointer;}
  .statusbar button:hover{color:var(--text);border-color:var(--text-dim);}
  .progress-wrap{margin:14px 0 4px;background:var(--panel-hi);border:1px solid var(--border);
    border-radius:8px;padding:14px 16px;}
  .progress-top{display:flex;justify-content:space-between;font-family:'JetBrains Mono',monospace;
    font-size:12px;color:var(--text-dim);margin-bottom:8px;}
  .progress-top .n{color:var(--amber);font-weight:700;}
  .bar{height:8px;background:#1c222c;border-radius:4px;overflow:hidden;}
  .bar-fill{height:100%;background:linear-gradient(90deg,var(--green),var(--amber));
    border-radius:4px;transition:width .4s ease;width:0%;}
  .phase{margin-top:22px;border:1px solid var(--border);border-radius:10px;
    background:var(--panel);overflow:hidden;}
  .phase-head{display:flex;align-items:center;gap:12px;padding:14px 16px;cursor:pointer;user-select:none;}
  .phase-head:hover{background:var(--panel-hi);}
  .node{width:26px;height:26px;border-radius:6px;border:1px solid var(--border);
    display:flex;align-items:center;justify-content:center;font-family:'JetBrains Mono',monospace;
    font-size:11px;font-weight:700;color:var(--text-dim);flex-shrink:0;}
  .node.done{background:var(--green);border-color:var(--green);color:#04170a;}
  .phase-title{flex:1;}
  .phase-title .name{font-weight:600;font-size:14.5px;color:#fff;}
  .phase-title .weeks{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--text-dim);margin-top:2px;}
  .chev{color:var(--text-dim);font-size:12px;transition:transform .2s;}
  .chev.open{transform:rotate(90deg);}
  .phase-body{display:none;border-top:1px solid var(--border);padding:14px 16px 18px;}
  .phase-body.open{display:block;}
  .week{margin-bottom:14px;}
  .week:last-child{margin-bottom:0;}
  .week-label{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--amber);
    text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px;}
  .item{display:flex;align-items:flex-start;gap:9px;padding:5px 0;cursor:pointer;}
  .item.disabled{opacity:.5;pointer-events:none;}
  .box{width:16px;height:16px;border:1.5px solid var(--border);border-radius:4px;
    margin-top:2px;flex-shrink:0;display:flex;align-items:center;justify-content:center;
    font-size:11px;color:#04170a;font-weight:700;}
  .box.checked{background:var(--green);border-color:var(--green);}
  .item-text{font-size:13.5px;line-height:1.45;}
  .item.checked .item-text{color:var(--text-dim);text-decoration:line-through;}
  .skip{margin-top:10px;padding:9px 11px;background:#1a1210;border:1px solid #3a2418;
    border-radius:6px;font-size:12px;color:#d29a6b;font-family:'JetBrains Mono',monospace;}
  .skip b{color:#e3b341;}
  .loading,.errbox{color:var(--text-dim);font-family:'JetBrains Mono',monospace;font-size:12px;
    padding:14px;border:1px solid var(--border);border-radius:8px;margin-top:16px;}
  .errbox{color:var(--red);border-color:#3a2418;}
  .modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.6);display:flex;align-items:center;
    justify-content:center;padding:20px;z-index:10;}
  .modal{background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:22px;
    max-width:420px;width:100%;}
  .modal h2{font-family:'JetBrains Mono',monospace;font-size:15px;color:#fff;margin:0 0 10px;}
  .modal p{font-size:13px;color:var(--text-dim);line-height:1.5;margin:0 0 14px;}
  .modal input{width:100%;background:#0a0d12;border:1px solid var(--border);color:var(--text);
    padding:9px 10px;border-radius:6px;font-family:'JetBrains Mono',monospace;font-size:12.5px;
    margin-bottom:12px;}
  .modal button{font-family:'JetBrains Mono',monospace;font-size:12.5px;background:var(--amber);
    color:#1a1207;border:none;padding:9px 14px;border-radius:6px;cursor:pointer;font-weight:700;}
</style>

<div id="root"><div class="loading">connecting to github...</div></div>

<script>
// ---- one-time config: your repo details ----
const OWNER = 'kish1562';
const REPO = 'genai_roadmap';
const PATH = 'ROADMAP.md';
const BRANCH = 'main';
const TOKEN_KEY = 'gh_pat_' + REPO;

let token = localStorage.getItem(TOKEN_KEY) || '';
let sha = null;         // current file sha, needed to commit updates
let rawText = '';       // raw markdown
let lines = [];         // parsed lines
let phases = [];        // parsed structure
let openPhase = null;
let saving = false;
let lastError = null;

function ghHeaders(){
  return {
    'Authorization': 'token ' + token,
    'Accept': 'application/vnd.github+json'
  };
}

async function loadFile(){
  try{
    const res = await fetch(`https://api.github.com/repos/${OWNER}/${REPO}/contents/${PATH}?ref=${BRANCH}`, {headers: ghHeaders()});
    if(!res.ok){
      if(res.status===401 || res.status===403){ throw new Error('Token invalid or missing "Contents: Read and write" permission.'); }
      if(res.status===404){ throw new Error('ROADMAP.md not found in repo — upload it first.'); }
      throw new Error('GitHub API error: '+res.status);
    }
    const data = await res.json();
    sha = data.sha;
    rawText = decodeURIComponent(escape(atob(data.content.replace(/\n/g,''))));
    lines = rawText.split('\n');
    parsePhases();
    lastError = null;
  }catch(e){
    lastError = e.message;
  }
  render();
}

function parsePhases(){
  phases = [];
  let currentPhase = null;
  let currentWeek = null;
  lines.forEach((line, idx) => {
    const phaseMatch = line.match(/^##\s+Phase\s+\d+\s*—\s*(.+?)\s*\((.+)\)\s*$/);
    const weekMatch = line.match(/^\*\*(.+)\*\*$/);
    const itemMatch = line.match(/^-\s\[([ xX])\]\s(.+)$/);
    const skipMatch = line.match(/^>\s*Skip:\s*(.+)$/);

    if(phaseMatch){
      currentPhase = {name: phaseMatch[1], weeks: phaseMatch[2], weeksData: [], skip: null};
      phases.push(currentPhase);
      currentWeek = null;
    } else if(weekMatch && currentPhase){
      currentWeek = {label: weekMatch[1], items: []};
      currentPhase.weeksData.push(currentWeek);
    } else if(itemMatch && currentWeek){
      currentWeek.items.push({lineIdx: idx, checked: itemMatch[1].toLowerCase()==='x', text: itemMatch[2]});
    } else if(skipMatch && currentPhase){
      currentPhase.skip = skipMatch[1];
    }
  });
  if(openPhase===null && phases.length) openPhase = phases[0].name;
}

function allItems(){
  return phases.flatMap(p => p.weeksData.flatMap(w => w.items));
}

async function toggleItem(lineIdx){
  if(saving) return;
  const line = lines[lineIdx];
  const m = line.match(/^-\s\[([ xX])\]\s(.+)$/);
  if(!m) return;
  const newChecked = m[1] === ' ';
  lines[lineIdx] = line.replace(/^-\s\[[ xX]\]/, newChecked ? '- [x]' : '- [ ]');
  parsePhases();
  render();
  await commitUpdate();
}

async function commitUpdate(){
  saving = true; lastError = null; render();
  try{
    const items = (()=>{ // recompute after reparse
      const its = [];
      phases.forEach(p=>p.weeksData.forEach(w=>w.items.forEach(i=>its.push(i))));
      return its;
    })();
    const doneCount = items.filter(i=>i.checked).length;
    const total = items.length;
    const pct = Math.round((doneCount/total)*100);
    // update the trailing progress line if present
    const progressIdx = lines.findIndex(l => /^\*\*Progress:/.test(l));
    const progressLine = `**Progress: ${doneCount} / ${total} tasks (${pct}%)**`;
    if(progressIdx >= 0) lines[progressIdx] = progressLine;

    const newContent = lines.join('\n');
    const res = await fetch(`https://api.github.com/repos/${OWNER}/${REPO}/contents/${PATH}`, {
      method: 'PUT',
      headers: {...ghHeaders(), 'Content-Type':'application/json'},
      body: JSON.stringify({
        message: 'Update roadmap progress',
        content: btoa(unescape(encodeURIComponent(newContent))),
        sha: sha,
        branch: BRANCH
      })
    });
    if(!res.ok){
      const err = await res.json().catch(()=>({}));
      throw new Error(err.message || ('Commit failed: '+res.status));
    }
    const data = await res.json();
    sha = data.content.sha;
    rawText = newContent;
  }catch(e){
    lastError = e.message;
    await loadFile(); // resync with server truth on failure
  }
  saving = false;
  render();
}

function phaseDone(phase){
  const items = phase.weeksData.flatMap(w=>w.items);
  return items.length>0 && items.every(i=>i.checked);
}

function saveToken(val){
  token = val.trim();
  localStorage.setItem(TOKEN_KEY, token);
  loadFile();
}

function clearToken(){
  if(confirm('Remove saved token from this browser?')){
    localStorage.removeItem(TOKEN_KEY);
    token = '';
    render();
  }
}

function render(){
  const root = document.getElementById('root');

  if(!token){
    root.innerHTML = `
      <div class="eyebrow">roadmap // genai engineer</div>
      <h1>0 &rarr; GenAI Engineer</h1>
      <div class="modal-bg"><div class="modal">
        <h2>Connect to GitHub</h2>
        <p>Paste your fine-grained personal access token (scoped to <b>${REPO}</b> only, Contents: Read and write). It's stored only in this browser and used only to talk directly to GitHub's API &mdash; never sent anywhere else.</p>
        <input id="tokinput" type="password" placeholder="github_pat_..." />
        <button onclick="saveToken(document.getElementById('tokinput').value)">Connect</button>
      </div></div>`;
    return;
  }

  if(lastError && !phases.length){
    root.innerHTML = `
      <div class="eyebrow">roadmap // genai engineer</div>
      <h1>0 &rarr; GenAI Engineer</h1>
      <div class="errbox">Couldn't load from GitHub: ${lastError}</div>
      <div class="statusbar" style="margin-top:14px;"><span></span><button onclick="clearToken()">reset token</button></div>`;
    return;
  }

  if(!phases.length){
    root.innerHTML = '<div class="loading">connecting to github...</div>';
    return;
  }

  const items = allItems();
  const doneCount = items.filter(i=>i.checked).length;
  const pct = Math.round((doneCount/items.length)*100);

  let html = '';
  html += '<div class="eyebrow">roadmap // genai engineer</div>';
  html += '<h1>0 &rarr; GenAI Engineer</h1>';
  html += '<div class="sub">Auto-saves straight to your GitHub repo on every click.</div>';

  html += '<div class="statusbar">';
  if(saving) html += '<span><span class="dot"></span>saving to github...</span>';
  else if(lastError) html += '<span><span class="dot err"></span>save failed &mdash; retry by toggling again</span>';
  else html += '<span><span class="dot ok"></span>synced with github</span>';
  html += '<button onclick="clearToken()">disconnect</button>';
  html += '</div>';

  html += '<div class="progress-wrap">';
  html += '<div class="progress-top"><span>overall progress</span><span><span class="n">'+doneCount+'</span>/'+items.length+' tasks &middot; <span class="n">'+pct+'%</span></span></div>';
  html += '<div class="bar"><div class="bar-fill" style="width:'+pct+'%"></div></div>';
  html += '</div>';

  phases.forEach((phase, pi) => {
    const isOpen = openPhase === phase.name;
    const done = phaseDone(phase);
    html += '<div class="phase">';
    html += '<div class="phase-head" onclick="togglePhase('+JSON.stringify(phase.name)+')">';
    html += '<div class="node'+(done?' done':'')+'">'+(done?'&check;':(pi+1))+'</div>';
    html += '<div class="phase-title"><div class="name">'+phase.name+'</div><div class="weeks">'+phase.weeks+'</div></div>';
    html += '<div class="chev'+(isOpen?' open':'')+'">&#9654;</div>';
    html += '</div>';
    html += '<div class="phase-body'+(isOpen?' open':'')+'">';
    phase.weeksData.forEach(w => {
      html += '<div class="week"><div class="week-label">'+w.label+'</div>';
      w.items.forEach(item => {
        html += '<div class="item'+(item.checked?' checked':'')+(saving?' disabled':'')+'" onclick="toggleItem('+item.lineIdx+')">';
        html += '<div class="box'+(item.checked?' checked':'')+'">'+(item.checked?'&check;':'')+'</div>';
        html += '<div class="item-text">'+item.text+'</div>';
        html += '</div>';
      });
      html += '</div>';
    });
    if(phase.skip) html += '<div class="skip"><b>skip:</b> '+phase.skip+'</div>';
    html += '</div></div>';
  });

  root.innerHTML = html;
}

function togglePhase(name){
  openPhase = (openPhase===name) ? null : name;
  render();
}

if(token) loadFile(); else render();
</script>
